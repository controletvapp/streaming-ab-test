  "Todos":null,"Acao":28,"Drama":18,"Comedia":35,"Terror":27,

const GENRE_MAP = {
  28:"Acao",18:"Drama",35:"Comedia",27:"Terror",878:"Sci-Fi",
  99:"Documentario",53:"Thriller",10749:"Romance",16:"Animacao",
  10759:"Acao",10765:"Sci-Fi",80:"Crime",9648:"Misterio"

const GENRE_LABELS = {
  "Todos":"Todos","Acao":"Ação","Drama":"Drama","Comedia":"Comédia","Terror":"Terror",
  "Sci-Fi":"Sci-Fi","Documentario":"Documentário","Thriller":"Thriller",

};

const SORTS = ["Trending","Melhor Nota","Recentes"];

function getPlatform(id) {
  return PLATFORMS.find(function(p) { return p.id === id; }) || null;
}

async function tmdb(path, params) {
  params = params || {};
  const qs = new URLSearchParams(Object.assign({ path: path, language: "pt-BR" }, params));
  const r = await fetch("/tmdb?" + qs.toString());
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

function mapGenre(ids) {
  ids = ids || [];
  for (var i = 0; i < ids.length; i++) {
    if (GENRE_MAP[ids[i]]) return GENRE_MAP[ids[i]];
  }
  return "Outros";
}

function mapItem(item, platformId) {
  var pl = getPlatform(platformId);
  return {
    id: item.id,
    title: item.title || item.name || "",
    year: (item.release_date || item.first_air_date || "").slice(0, 4),
    type: item.media_type === "tv" ? "Serie" : "Filme",
    genre: mapGenre(item.genre_ids),
    imdb: item.vote_average ? Math.round(item.vote_average * 10) / 10 : null,
    description: item.overview || "",
    poster: item.poster_path ? IMG + item.poster_path : null,
    backdrop: item.backdrop_path ? IMG_BIG + item.backdrop_path : null,
    trending: item.popularity > 100,
    platform_id: platformId,
    platform_name: pl ? pl.name : "",
  };
}

async function fetchByGenre(platformIds, genre, typeFilter, sortBy) {
  var providerIds = platformIds.map(function(id) {
    var p = getPlatform(id); return p ? p.tmdb : null;
  }).filter(Boolean).join("|");

  var genreId = TMDB_GENRE_IDS[genre];
  var apiSort = sortBy === "Melhor Nota" ? "vote_average.desc" : sortBy === "Recentes" ? "primary_release_date.desc" : "popularity.desc";

  var movieParams = { with_watch_providers: providerIds, watch_region: "BR", sort_by: apiSort, "vote_count.gte": 20, page: 1 };
  if (genreId) movieParams.with_genres = genreId;

  var tvGenreMap = { 28: 10759, 878: 10765 };
  var tvGenreId = genreId ? (tvGenreMap[genreId] || genreId) : null;
  var tvSort = sortBy === "Recentes" ? "first_air_date.desc" : apiSort;
  var tvParams = { with_watch_providers: providerIds, watch_region: "BR", sort_by: tvSort, "vote_count.gte": 10, page: 1 };
  if (tvGenreId) tvParams.with_genres = tvGenreId;

  var calls = [];
  if (typeFilter === "Todos" || typeFilter === "Filme") {
    calls.push(tmdb("/3/discover/movie", movieParams).then(function(d) {
      return (d.results || []).slice(0, 12).map(function(item, i) {
        return mapItem(Object.assign({}, item, { media_type: "movie" }), platformIds[i % platformIds.length]);
      });
    }));
  } else { calls.push(Promise.resolve([])); }

  if (typeFilter === "Todos" || typeFilter === "Série") {
    calls.push(tmdb("/3/discover/tv", tvParams).then(function(d) {
      return (d.results || []).slice(0, 8).map(function(item, i) {
        return mapItem(Object.assign({}, item, { media_type: "tv" }), platformIds[i % platformIds.length]);
      });
    }));
  } else { calls.push(Promise.resolve([])); }

  var results = await Promise.all(calls);
  return results[0].concat(results[1]);
}

async function fetchTrending(platformIds) {
  var providerIds = platformIds.map(function(id) {
    var p = getPlatform(id); return p ? p.tmdb : null;
  }).filter(Boolean).join("|");
  var d = await tmdb("/3/discover/movie", { with_watch_providers: providerIds, watch_region: "BR", sort_by: "popularity.desc", "vote_count.gte": 50, page: 1 });
  return (d.results || []).slice(0, 8).map(function(item, i) {
    return mapItem(Object.assign({}, item, { media_type: "movie" }), platformIds[i % platformIds.length]);
  });
}

async function searchTitle(query) {
  var data = await tmdb("/3/search/multi", { query: query, page: 1 });
  var result = (data.results || []).find(function(r) { return r.media_type === "movie" || r.media_type === "tv"; });
  if (!result) return { found: false };
  var type = result.media_type === "tv" ? "tv" : "movie";
  var prov = await tmdb("/3/" + type + "/" + result.id + "/watch/providers");
  var br = (prov.results && prov.results.BR) ? prov.results.BR : {};
  var seen = new Set(); var allP = [];
  function addP(list, access) {
    (list || []).forEach(function(p) {
      var known = PLATFORMS.find(function(pl) { return pl.tmdb === p.provider_id; });
      var pid = known ? known.id : String(p.provider_id);
      if (!seen.has(pid)) { seen.add(pid); allP.push({ id: pid, name: p.provider_name, access: access }); }
    });
  }
  addP(br.flatrate, "incluido"); addP(br.rent, "aluguel"); addP(br.buy, "compra");
  return {
    found: true, title: result.title || result.name || "",
    year: (result.release_date || result.first_air_date || "").slice(0, 4),
    type: type === "tv" ? "Serie" : "Filme", genre: mapGenre(result.genre_ids),
    imdb: result.vote_average ? Math.round(result.vote_average * 10) / 10 : null,
    description: result.overview || "", poster: result.poster_path ? IMG + result.poster_path : null,
    platforms: allP,
  };
}

      <form onSubmit={doSearch} style={{display:"flex",gap:10,marginBottom:22}}>
        <input value={q} onChange={function(e){ setQ(e.target.value); setRes(null); setErr(""); }} placeholder="Filme, série ou documentário..." autoFocus style={{flex:1,background:"#fff",border:"1.5px solid rgba(0,0,0,0.08)",borderRadius:12,padding:"13px 15px",color:"#0F0F0F",fontSize:14,fontFamily:"inherit",outline:"none",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}/>
        <button type="submit" disabled={loading||!q.trim()} style={{background:TEAL,border:"none",borderRadius:12,padding:"13px 16px",cursor:"pointer",fontSize:16,boxShadow:"0 4px 12px "+TEAL+"40"}}>{loading?"⏳":"🔍"}</button>
      </form>
      {loading && React.createElement(Spinner, {label:"Buscando onde assistir..."})}
      {err && <p style={{color:"#FF7043",fontSize:13,textAlign:"center",padding:"20px 0"}}>{err}</p>}
      {!res&&!loading&&!err&&<div style={{textAlign:"center",padding:"90px 20px"}}><p style={{fontSize:36,marginBottom:14}}>🎬</p><p style={{color:"#ccc",fontSize:14,lineHeight:1.6}}>Busque qualquer título e descubra<br/>se você já tem acesso.</p></div>}
      {res&&!loading&&!res.found&&<div style={{textAlign:"center",padding:"50px 20px",background:"#fff",borderRadius:16,border:"1.5px solid rgba(0,0,0,0.07)",boxShadow:"0 4px 16px rgba(0,0,0,0.05)"}}><span style={{fontSize:30}}>🤷</span><p style={{color:"#888",marginTop:10}}>Título não encontrado.</p><p style={{color:"#ccc",fontSize:12,marginTop:4}}>Tente o nome em inglês ou original.</p></div>}
      {res&&!loading&&res.found&&(
        <div>
          <div style={{background:"#fff",border:"1.5px solid rgba(0,0,0,0.07)",borderRadius:16,overflow:"hidden",marginBottom:12,boxShadow:"0 4px 16px rgba(0,0,0,0.06)"}}>
            {res.poster&&<div style={{height:140,overflow:"hidden",position:"relative"}}><img src={res.poster} alt={res.title} style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 20%,#fff 100%)"}}/></div>}
            <div style={{padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                <div style={{flex:1}}>
                  <p style={{fontSize:9,color:"#bbb",textTransform:"uppercase",letterSpacing:1}}>{typeLabel(res.type)} · {res.year}{res.genre?" · "+(GENRE_LABELS[res.genre]||res.genre):""}</p>
                  <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,fontWeight:400,marginTop:4,letterSpacing:-.5}}>{res.title}</h2>
                  <p style={{fontSize:12,color:"#888",marginTop:6,lineHeight:1.55}}>{res.description}</p>
                </div>
                {res.imdb&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0,background:TEAL+"12",border:"1.5px solid "+TEAL+"28",borderRadius:10,padding:"8px 11px"}}><span style={{color:TEAL,fontSize:15}}>★</span><span style={{color:TEAL,fontWeight:700,fontSize:17}}>{res.imdb}</span></div>}
              </div>
              {res.platforms&&res.platforms.some(function(p){ return sel.includes(p.id)&&p.access==="incluido"; })&&(
                <div style={{display:"flex",alignItems:"center",gap:12,marginTop:14,background:TEAL+"08",border:"1.5px solid "+TEAL+"25",borderRadius:12,padding:"12px 14px"}}>
                  <span style={{fontSize:18}}>🎉</span>
                  <div><p style={{color:TEAL,fontWeight:600,fontSize:13}}>Você já tem acesso!</p><p style={{color:TEAL,opacity:.55,fontSize:11}}>Incluído em uma das suas plataformas</p></div>
                </div>
              )}
            </div>
          </div>
          {(function(){
            var mine=res.platforms?res.platforms.filter(function(p){ return sel.includes(p.id); }):[];
            var others=res.platforms?res.platforms.filter(function(p){ return !sel.includes(p.id); }):[];
            return (
              <div>
                {mine.length>0&&<div style={{marginBottom:12}}>
                  <p style={{fontSize:9,color:"#bbb",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8,fontWeight:600}}>📱 Nas suas plataformas</p>
                  {mine.map(function(p,i){
                    var info=accessInfo(p.access); var pI=getPlatform(p.id); var inc=p.access==="incluido";
                    return <div key={i} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 13px",borderRadius:12,marginBottom:6,border:inc?"1.5px solid "+(pI?pI.color:"#333")+"40":"1.5px solid rgba(0,0,0,0.07)",background:inc?(pI?pI.color:"#333")+"08":"#fafafa",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                      {knownIds.includes(p.id)?React.createElement(Dot,{id:p.id,size:27}):React.createElement("span",{style:{width:27,height:27,borderRadius:6,background:"#eee",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:13}},"📺")}
                      <span style={{flex:1,fontSize:13,color:"#444",fontWeight:500}}>{p.name}</span>
                      <span style={{fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:6,background:info[1]+"18",color:info[1]}}>{info[0]}</span>
                    </div>;
                  })}
                </div>}
                {mine.length===0&&<div style={{textAlign:"center",padding:18,marginBottom:12,background:"#fff",borderRadius:12,border:"1.5px solid rgba(0,0,0,0.07)"}}><p style={{color:"#aaa"}}>😅 Não está em nenhuma das suas plataformas.</p></div>}
                {others.length>0&&<div>
                  <p style={{fontSize:9,color:"#ccc",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8,fontWeight:600}}>🌐 Disponível também em</p>
                  {others.map(function(p,i){
                    var info=accessInfo(p.access);
                    return <div key={i} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 13px",borderRadius:12,marginBottom:6,opacity:.7,border:"1.5px solid rgba(0,0,0,0.06)",background:"#fafafa"}}>
                      {knownIds.includes(p.id)?React.createElement(Dot,{id:p.id,size:25}):React.createElement("span",{style:{width:25,height:25,borderRadius:5,background:"#eee",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:12}},"📺")}
                      <span style={{flex:1,fontSize:13,color:"#888"}}>{p.name}</span>
                      <span style={{fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:6,background:info[1]+"18",color:info[1]}}>{info[0]}</span>
                    </div>;
                  })}
                </div>}
                {res.platforms&&res.platforms.length===0&&<div style={{textAlign:"center",padding:18,background:"#fff",borderRadius:12,border:"1.5px solid rgba(0,0,0,0.07)"}}><p style={{color:"#aaa"}}>🌐 Não encontrado em nenhuma plataforma no Brasil.</p></div>}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function Modal(props) {
  var item=props.item; var stars=props.stars; var setStars=props.setStars; var onClose=props.onClose;
  var p=getPlatform(item.platform_id); var pColor=p?p.color:"#333";
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(8px)"}}>
      <div onClick={function(e){ e.stopPropagation(); }} style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:560,maxHeight:"88vh",overflowY:"auto",position:"relative",boxShadow:"0 -20px 60px rgba(0,0,0,0.15)"}}>
        <button onClick={onClose} style={{position:"absolute",top:13,right:13,background:"rgba(0,0,0,0.06)",border:"none",color:"#aaa",width:29,height:29,borderRadius:"50%",cursor:"pointer",fontFamily:"inherit",fontSize:12,zIndex:1}}>✕</button>
        <div style={{height:140,borderRadius:"20px 20px 0 0",overflow:"hidden",position:"relative",background:"linear-gradient(135deg,"+pColor+"25,#f8f8f8 75%)"}}>
          {(item.backdrop||item.poster)?<img src={item.backdrop||item.poster} alt={item.title} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:48}}>{typeEmoji(item.type)}</div>}
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,#fff 100%)"}}/>
        </div>
        <div style={{padding:"18px 20px 34px"}}>
          <p style={{fontSize:9,color:"#bbb",textTransform:"uppercase",letterSpacing:1}}>{typeLabel(item.type)} · {item.year}</p>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:5}}>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,fontWeight:400,letterSpacing:-.5,flex:1}}>{item.title}</h2>
            {item.imdb&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0,marginLeft:10,background:TEAL+"12",border:"1.5px solid "+TEAL+"25",borderRadius:9,padding:"6px 9px"}}><span style={{color:TEAL,fontSize:12}}>★</span><span style={{color:TEAL,fontWeight:700,fontSize:14}}>{item.imdb}</span></div>}
          </div>
          <p style={{fontSize:12,color:"#888",marginTop:10,lineHeight:1.6}}>{item.description||"Sem descrição disponível."}</p>
          <div style={{display:"flex",gap:6,marginTop:11}}>
            {item.genre&&<span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:"rgba(0,0,0,0.05)",color:"#aaa"}}>{GENRE_LABELS[item.genre]||item.genre}</span>}
            {item.trending&&<span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:"rgba(255,100,0,0.08)",color:"#FF6B35"}}>🔥 Trending</span>}
          </div>
          <div style={{marginTop:16,padding:"13px 14px",borderRadius:12,display:"flex",alignItems:"center",gap:11,background:pColor+"10",border:"1.5px solid "+pColor+"25"}}>
            <Dot id={item.platform_id} size={29}/>
            <div><p style={{fontSize:10,color:"#aaa"}}>Disponível em</p><p style={{fontSize:13,fontWeight:600,color:"#333"}}>{item.platform_name}</p></div>
            <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,padding:"4px 9px",borderRadius:7,background:TEAL+"15",color:TEAL}}>✓ Incluído</span>
          </div>
          <div style={{marginTop:16}}>
            <p style={{fontSize:10,color:"#bbb",marginBottom:7}}>Sua avaliação</p>
            <Stars value={stars[item.id]||0} onChange={function(v){ setStars(function(s){ return Object.assign({},s,{[item.id]:v}); }); }}/>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  var _step=useState("onboarding"); var step=_step[0]; var setStep=_step[1];
  var _sel=useState([]); var sel=_sel[0]; var setSel=_sel[1];
  var _tab=useState("catalog"); var tab=_tab[0]; var setTab=_tab[1];
  var _stars=useState({}); var stars=_stars[0]; var setStars=_stars[1];
  var _modal=useState(null); var modal=_modal[0]; var setModal=_modal[1];

  function handleStart(selected) { setSel(selected); setStep("app"); }
  if (step === "onboarding") return React.createElement(Onboarding, { onStart: handleStart });

  return (
    <div style={{minHeight:"100vh",background:"#F8F7F4",color:"#0F0F0F"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"radial-gradient(circle,rgba(0,0,0,0.04) 1px,transparent 1px)",backgroundSize:"24px 24px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:640,margin:"0 auto",padding:"0 16px 80px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",borderBottom:"1.5px solid rgba(0,0,0,0.06)"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,letterSpacing:-.5}}>Stream<span style={{color:BLUE,fontStyle:"italic"}}>Finder</span></div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            {sel.map(function(id){ return React.createElement(Dot,{key:id,id:id,size:23}); })}
            <button onClick={function(){ setStep("onboarding"); }} style={{background:"none",border:"1.5px solid rgba(0,0,0,0.08)",borderRadius:7,color:"#bbb",fontSize:10,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",marginLeft:4}}>editar</button>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:"1.5px solid rgba(0,0,0,0.06)",marginBottom:18}}>
          {[["catalog","🎞 Catálogo"],["search","🔍 Buscar"]].map(function(pair){
            var id=pair[0]; var label=pair[1]; var active=tab===id;
            return <button key={id} onClick={function(){ setTab(id); }} style={{flex:1,padding:"13px",background:"none",border:"none",fontSize:13,cursor:"pointer",fontFamily:"inherit",transition:"all .2s",color:active?"#0F0F0F":"#bbb",fontWeight:active?600:400,borderBottom:active?"2px solid "+TEAL:"2px solid transparent"}}>{label}</button>;
          })}
        </div>
        {tab==="catalog"&&<CatalogTab platformIds={sel} stars={stars} setStars={setStars} onModal={setModal}/>}
        {tab==="search"&&<SearchTab sel={sel}/>}
      </div>
      {modal&&React.createElement(Modal,{item:modal,stars:stars,setStars:setStars,onClose:function(){setModal(null);}})}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
